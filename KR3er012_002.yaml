body:
  text: 卷中論腎臟虛實寒熱生死逆順脈證之法第三十腎者精神之舍性命之根外通於耳男以閉一作庫精女以包血與膀胱為表裡足少陰太陽是其經也腎氣絶則不盡其天命而死也旺於冬其脈沉濡曰平反此者病其脈彈石名曰太過病在外其去如數者為不及病在內太過則令人解㑊脊脈痛而少氣本作令人體瘠而少氣不欲言不及則令人心懸如飢眇中清脊中痛少腸腹滿小便滑本云心如懸少腹痛小便滑變赤黃色也又腎脈來喘喘纍纍如鉤按之而堅曰平又來如引葛按之益堅曰病來如轉索辟辟如彈石曰死又腎脈但石無胃氣亦死腎有水則腹大臍腫腰重痛不得溺陰下濕如牛鼻頭汗出是為逆寒大便難其面反瘦也腎病手足逆冷面赤目黃小便不禁骨節煩痛小腹結痛氣上衝心脈當沉細而滑今反浮大而緩其色當黑其今反者是土來剋水為大逆十死不治也又腎病面色黑其氣虛弱翕翕少氣兩耳若聾精自出飲食少小便清膝下冷其脈沉滑而遲為可治又冬脈沉濡而滑曰平反浮澀而短肺來乘腎雖病易治反弦細而長者肝來乘腎不治自愈反浮大而洪心來乘腎不為害腎病腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂也陰邪入腎則骨痛腰上引項瘠背疼此皆舉重用力及遇房汗出當風浴水或久立則傷腎也又其脈急甚則腎痿瘕疾微急則沉厥奔豚足不收緩甚則折脊微緩則洞泄食不化入咽還出大甚則陰痿微大則石水起臍下至小腹其腫埵埵然而上至胃脘者死不治小甚則洞泄微小則消疸滑甚則癃㿗微滑則骨痿坐弗能起目視見花澀甚則大壅塞微澀則不月疾痔又其脈之至也上堅而大有膿氣在陰中及腹內名曰腎痹得之因浴冷水而臥脈來沉而大堅浮而緊苦手足骨腫厥陰痿不起腰背疼小腹腫心下水氣時脹滿而洞泄此皆浴水中身未乾而合房得之也虛則夢舟溺人得其時夢伏水中若有所畏盛實則夢腰脊離解不相屬厥邪客於腎則夢臨深投水中腎脹則腹痛滿引背怢怢然腰痹痛腎病夜半患四季甚下晡靜腎生病則口熱舌乾咽腫上氣嗌乾及心煩而痛黃疸腸澼痿厥腰脊背急痛嗜臥足下熱而痛胻酸病久不已則腿筋痛小便閉而兩脅脹支滿目盲者死腎之積苦腰脊相引而疼飢見飽減此腎中寒結在臍下也諸積大法其脈來細軟而附骨者是也又面黑目白腎已內傷八日死又陰縮小便不出出而不快者亦死又其色青黃連耳左右其人年三十許百日死若偏在一邊一月死實則煩悶臍下重熱則口舌乾焦而小便澀黃寒則陰中與腰脊俱疼面黑耳干噦而不食或嘔血者是也又喉中鳴坐而喘咳唾血出亦為腎虛寒氣欲絶也寒熱虛實既明詳細調救即十可十全之道也論膀胱虛實寒熱生死逆順脈證之法第三十一膀胱者津液之腑與腎為表裡號曰水曹掾又名玉海足太陽是其經也總通於五腑所以五腑有疾即應膀胱膀胱有疾即應胞囊也傷熱則小便不利熱入膀胱則其氣急而苦小便黃澀也膀胱寒則小便數而清也又石水發則其根在膀胱四肢瘦小其腹脹大者是也又膀胱咳久不已則傳入三焦腸滿而不欲飲食也然上焦主心肺之病人有熱則食不入胃寒則精神不守泄利不止語聲不出也實則上絶於心氣不行也虛則引起氣之於肺也其三焦之氣和則五臟六腑皆和逆則皆逆膀胱中有厥陰氣則夢行不快滿脹則小便不下臍下重悶或肩痛也絶則三日氣死時雞鳴也其三焦之論備云於後論三焦虛實寒熱生死逆順脈證之法第三十二三焦者人之三元之氣也號曰中清之腑總領五臟六腑榮衛經絡內外左右上下之氣也三焦通則內外左右上下皆通也其於周身灌體和內調外榮左養右導上宣下莫大於此者也又名玉海水道上則曰三管中則名霍亂下則曰走哺名雖三而歸一有其名而無形者也亦號曰孤獨之腑而衛出於上榮出於中上者絡脈之系也中者經脈之系也下者水道之系也亦又屬膀胱之宗始主通陰陽調虛實呼吸有病則苦腹脹氣滿小腹堅溺而不得便而窘迫也溢則作水留則為脹足太陽是其經也又上焦實熱則額汗出而身無汗能食而氣不利舌乾口焦咽閉之類腹脹時時脅肋痛也寒則不入食吐酸水胸背引痛嗌乾津不納也實則食已還出膨膨然不樂虛則不能制下遺便溺而頭面腫也中焦實熱則上下不通腹脹而喘咳下氣不上上氣不下關格而不通也寒則下痢不止食飲不消而中滿也虛則腸鳴鼓脹也下焦實熱則小便不通而大便難苦重痛也虛寒則大小便泄下而不止三焦之氣和則內外和逆則內外逆故云三焦者人之三元之氣也宜修養矣論痹第三十三痹者風寒暑濕之氣中於人臟腑之為也入腑則病淺易治入臟則病深難治而有風痹有寒痹有濕痹有熱痹有氣痹而又有筋肉血肉氣之五痹也大凡風寒暑濕之邪入於肝則名筋痹入於腎則名骨痹入於心則名血痹入於脾則名肉痹入於肺則名氣痹感病則同其治乃異痹者閉也五臟六腑感於邪氣亂於真氣閉而不仁故曰痹病或痛或癢或淋或急或緩而不能收持或拳而不能舒張或行立艱難或言語謇澀或半身不遂或四肢拳縮或口眼偏邪或手足欹側或能行步而不能言語或能言語而不能行步或左偏枯或右壅滯或上不通於下或下不通於上或大腑閉塞一作小便祕澀或左右手疼痛或得疾而即死或感邪而未亡或喘滿而不寐或昏冒而不醒種種諸症皆出於痹也痹者風寒暑濕之氣中於人則使之然也其於脈候形證治療之法亦各不同焉論氣痹第三十四氣痹者愁憂思喜怒過多則氣結於上久而不消則傷肺肺傷則生氣漸衰則邪氣愈勝留於上則胸腹痹而不能食注於下則腰腳重而不能行攻於左則左不遂衝於右則右不仁貫於舌則不能言遺於腸中則不能溺壅而不散則痛流而不聚則麻真經既損難以醫治邪氣不勝易為痊愈其脈右手寸口沉而遲澀者是也宜節憂思以養氣慎一作絶喜怒以全真此最為良法也論血痹第三十五血痹者飲酒過多懷熱太盛或寒折於經絡或濕犯於榮衛因而血摶遂成其咎故使人血不能榮於外氣不能養於內內外已失漸漸消削左先枯則右不能舉右先枯則左不能伸上先枯則上不能制於下下先枯則下不能克於上中先枯則不能通疏百證千狀皆失血也其脈左手寸口脈結而不流利或如斷絶者是也論肉痹第三十六肉痹者飲食不節膏粱肥美之所為也脾者肉之本脾氣已失則肉不榮肉不榮則肌膚不滑澤肌肉不滑澤則腠理疏則風寒暑濕之邪易為入故久不治則為肉痹也肉痹之狀其先能食而不能充悅四肢緩而不收持者是也其右關脈舉按皆無力而往來澀者是也宜節飲食以調其臟常起居以安其脾然後依經補瀉以求其愈爾論筋痹第三十七筋痹者由怒叫無時行步奔急淫邪傷肝肝失其氣因而寒熱所客久而不去流入筋會則使人筋急而不能行步舒緩也故曰筋痹宜活血以補肝溫氣以養腎然後服餌湯丸治得其宜即疾瘳已不然則害人矣其脈左關中弦急而數浮沉有力者是也論骨痹第三十八骨痹者乃嗜欲不節傷於腎也腎氣內消則不能關禁不能關禁則中上俱亂中上俱亂則三焦之氣痞而不通三焦痞而飲食不糟粕飲食不糟粕則精氣日衰精氣日衰則邪氣妄入邪氣妄入則上衝心舌上衝心舌則為不語中犯脾胃則為不充下流腰膝則為不遂傍攻四肢則為不仁寒在中則脈遲熱在中則脈數風在中則脈浮濕在中則脈濡虛在中則脈滑其證不一要在詳明治療法列於後章論治中風偏枯之法第三十九人病中風偏枯其脈數而面乾黑黧手足不遂語言謇澀治之奈何在上則吐之在中則瀉之在下則補之在外則發之在內則溫之按之尉之也吐謂出其涎也瀉謂通其塞也補謂益其不足也發謂發其汗也溫謂驅其濕也按謂散其氣也尉謂助其陽也治之各合其宜安可一揆在求其本脈浮則發之脈滑則吐之脈伏而澀則瀉之脈緊則溫之脈遲則尉之脈閉則按之要察其可否故不可一揆而治者也論五丁狀候第四十五丁者皆由喜怒憂思沖寒冒熱恣飲醇酒多嗜甘肥毒魚鮓醬色欲過度之所為也蓄其毒邪浸漬臟腑久不攄散始變為丁其名有五一曰白丁二曰赤丁三曰黃丁四曰黑丁五曰青丁白丁者起於右鼻下初起如粟米根赤頭白或頑麻或痛癢使人憎寒頭重狀若傷寒不欲食胸膈滿悶喘促昏冒者死未者可治此疾不過五日禍必至矣宜急治之赤丁在舌下根頭俱赤發痛舌本硬不能言多驚煩悶恍惚多渴引一作飲水不休小便不通發狂者死未者可治此疾不過七日禍必至也不可治矣大人小兒皆能患也黃丁者起於唇齒齦邊其色黃中有黃水發則令人多一作能食而還一作復出手足麻木涎出不止腹脹而煩多睡不寐者死未者可治黑丁者起於耳前狀如瘢痕其色黑長減不定使人牙關急腰脊腳膝不仁不然即痛亦不出三歲禍必至矣不可治也此由腎氣漸絶故也宜慎欲事青丁者起於目下始如瘤瘢其色青硬如石使人目昏昏然無所見多恐悸惕睡不安寧久不已則令人目盲或脫精有此則不出一年禍必至矣白丁者其根在肺赤丁者其根在心黃丁者其根在脾黑丁者其根在腎青丁者其根在肝五丁之候一作疾最為巨疾一作病不可不察也治療之法一一如下陸本有方八道在此後印本無之今附下卷之末論癰疽瘡腫第四十一夫癰疽瘡腫之所作也皆五臟六腑蓄毒不流則生本作皆有矣非獨因榮衛壅塞而發者也其行也有處其主也有歸假令發於喉舌者心之毒也發於皮毛者發於肌肉者脾之毒也發於骨髓者腎之毒也闕肝毒發於下者陰中之毒也發於上者陽中之毒也發於外者六腑之毒也發於內者五臟之毒也故內曰壞外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑則易治感於五臟則難瘳也又近骨者多冷近虛者多熱近骨者久不愈則化血成蠱近虛者久不愈則傳氣成漏成蠱則多癢而少痛或先癢後痛成漏則多痛而少癢或不痛或不癢內虛外實者多庠而少痛外虛內實者多痛而少癢血不止者則多死膿疾潰者則多生或吐逆無度飲食不時皆癰疽之使然也種候萬一一作多端要憑詳治療之法列在後篇論腳弱狀候不同第四十二人之病腳氣與氣腳之為異何也謂人之喜怒憂思寒熱邪毒之氣自內而注入於腳則名氣腳也風寒暑濕邪毒之氣從外而入於腳膝漸傳於內則名腳氣也然內外皆以邪奪正故使人病形頗相類例其於治療亦有上下先後也故分別其目若一揆而不察其由則無理致其瘳也夫喜怒憂思寒熱邪毒之氣流入股節或注於腳膝其狀類諸風歷節偏枯癰腫之證但入於腳膝則謂之氣腳也若從外而入於足從足而入臟者乃謂之腳氣也氣腳者先治內而次治外腳氣者先治外而次治內實者利之虛者益之又人之病腳氣多者何也謂人之心肺二經起於手脾腎肝三經起於足手則清邪中之足則濁邪中之人身之苦者手足耳而足則最重艱苦故風寒暑濕之氣多中於足以此腳氣之病多也然而得之病者從漸而生疾但始萌而不悟悟亦不曉醫家不為腳氣將為別疾治療不明因循至大身居危地本從微起浸成巨候流入臟腑傷於四肢頭項腹背也而疾未甚終不能知覺也特因他而作或如傷寒或如中暑或腹背疼痛或肢節不仁或語言錯亂或精神昏昧或時喘乏或暴盲聾或飲食不入或臟腑不通或攣急不遂或舒緩不收或口眼牽搐或手足顫掉種種多狀莫有達者故使愚俗束手受病死無告陳仁者見之豈不傷哉今述始末略示後學請深消息至如醉入房中飽眠露下當風取涼對月貪歡沐浴未乾而熟睡房室才罷而沖軒久立於低濕久佇於水涯冒雨而行瀆寒而寢勞傷汗出食飲悲生犯諸禁忌因成疾矣其於不正之氣中於上則害於頭目害於中則蠱於心腹形於下則災於腰腳及於旁則妨於肢節千狀萬證皆屬於氣腳但起於腳膝乃謂腳氣也形候脈證亦在詳明其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒滑而微者起於虛牢而堅者起於實在於上則由於上在於下則由於下在於中則生於中結而因氣散則因憂緊則因怒細則因悲風者汗之而愈濕者溫之而愈熱者解之而愈寒者尉之而愈虛者補之實者瀉之氣者流之憂者寬之怒者悅之悲者和之能通此者乃謂之良醫又腳氣之病傳於心腎則十死不治入心則恍惚忘謬嘔吐食不入眠不安寧口眼不定左手寸口手脈乍大乍小乍有乍無者是也入腎則腰腳俱腫小便不通呻吟不絶目額皆見黑色氣時上衝胸腹而喘其左手尺中脈絶者是也切宜詳審矣論水腫脈證生死候第四十三人中百病難療者莫過於水也水者腎之制也腎者人之本也腎氣壯則水還於海腎氣虛則水散於皮又三焦壅塞榮衛閉格血氣不從虛實交變水隨氣流故為水病有腫於頭目者有腫於腰腳者有腫於四肢者有腫於雙目者有因嗽而發者有因勞而生者有因凝滯而起者有因虛乏而成者有因五臟而出者有因六腑而來者類目多種而狀各不同所以難治者由此百狀人難曉達縱曉其端則又苦人以嬌恣不循理法觸冒禁忌弗能備矣故人中水疾死者多矣水有十名具於篇末一曰青水二曰赤水三曰黃水四曰白水五曰黑水六曰玄水七曰風水八曰石水九曰里水十曰氣水青水者其根起於肝其狀先從而腫而漸行一身也赤水者其根起於心其狀先從胸腫起也黃水者其根起於脾其狀先從腹腫也白水者其根起於肺其狀先從腳腫而上氣喘嗽也黑水者其根起於腎其狀先從足跗腫玄水者其根起於膽其狀先從頭面起腫而至足者是也風水者其根起於胃其狀先從四肢起腹滿大而通身腫也石水者其根在膀胱其狀起臍下而腹獨大是也里水者其根在小腸其狀先從小腹脹而不腫漸漸而腫也又注云一作小腹脹而暴腫也氣水者其根在大腸其狀乍來乍去乍盛乍衰者是也此良由上下不通關竅不利氣血痞格陰陽不調而致之也其脈洪大者可治微細者不可治也又消渴之疾久不愈令人患水氣其水臨時發散歸於五臟六腑則生為病也消渴者因冒風沖熱飢飽失節飲酒過量嗜欲傷頻或餌金石久而積成使之然也論諸淋及小便不利第四十四諸淋與小便不利者皆由五臟不通六腑不和三焦痞澀榮衛耗失冒熱飲酒過醉入房竭散精神勞傷氣血或因女色興而敗精不出或因迷寵不已而真髓多輸或驚惶不次或思慮未寧或飢飽過時或奔馳才定或隱忍大小便或發泄久興或寒入膀胱或暑中胞囊傷茲不慎致起斯疾狀候變異名亦不同則有冷熱氣勞膏砂虛實之八種耳冷淋者小便數色白如泔也熱淋者小便澀而色赤如血也氣淋者臍腹滿悶小便不通利而痛也勞淋者小便淋瀝不絶如水之滴漏而不斷絶也膏淋者小便中出物如脂膏也砂淋者腹臍中隱痛小便難其痛不可忍須臾從小便中下如砂石之類有大者如皂子或赤或白一作黃色澤不定此由腎氣弱而貪於女色房而不泄泄而不止虛傷真氣邪熱漸強結聚而成砂又如以水煮鹽火大水少鹽漸成石之類謂腎者水也咸歸於腎水消於下虛熱日甚煎結而成此非一時而作也蓋遠久乃發成節五歲敗即三年壯人五載禍必至矣宜乎急攻八淋之中唯此最危其脈盛大而實者可治虛小而澀者不可治虛者謂腎與膀胱俱虛而精滑夢泄小便不禁者也實則謂經絡閉澀水道不利而莖痛腿痠者也又諸淋之病與淋相從者活反者死凶治療之際亦在詳酌耳論服餌得失第四十五石之與金有服餌得失者蓋以其宜與不宜也或草或木或金或石或單方得力或群隊獲功或金石毒發而致斃或草木勢助而能全其驗不一者何也基本實者得宣通之性必延其壽其本虛者得補益之情必長其年虛而過瀉實乃更增千死其千萬歿其萬則決然也又有年少之輩富貴之人恃其藥力恣其酒欲誇弄其術暗使精神內損藥力扶持忽然疾作何能救療如是之者豈知災從內發但恐藥餌無微功實可歡哉其於久服方藥在審其宜人藥相合效豈妄邪假如臟不足則補其臟腑有餘則瀉其腑外實則理外內虛則養內上塞則引上下塞則通下中澀一作結則解中左病則治左右病則治右上下左右內外虛實各稱其法安有橫夭者也故藥無不效病無不愈者切務於謹察矣辨三痞論並方第四十六金石草木單服皆可以不死者有驗無驗在乎有志無志也雖能久服而有其藥熱壅塞而不散或上或下或痞或澀各有其候請速詳明用其此法免敗其志皆於壽矣謹論候並方具在後篇辨上痞候並方上痞者頭眩目昏面赤心悸肢節痛前後不仁多痰短氣懼火喜寒又狀若中風之類者是也宜用後方桑白皮闊一寸長一尺檳榔一枚木通一尺去皮一本作一兩大黃三分濕紙煨黃芩一分澤瀉二兩上銼為粗末水五升熬取三升取清汁分二一本作三服食後臨臥服辨中痞候並方中痞者腸滿四肢倦行立艱難食已嘔吐冒昧減食或渴者是也宜用後方大黃一兩濕紙十重包裹煨令香熟切作片子檳榔一枚木香一分上為末生蜜為丸如桐子大每服三十丸生薑湯下食後日午日進二服未減加之效即勿再服附方桂五錢不見火檳榔一個黑牽牛四兩生為末二兩上為末蜜酒調二錢以利為度辨下痞候並方下痞者小便不利臍下滿硬語言謇滯腰背疼痛腳重不能行立者是也宜用後方瞿麥頭子一兩官桂一分甘遂三分車前子一兩炒上件為末以獖豬腎一個去筋膜薄批開入藥末二錢勻糝濕紙裹慢火煨熟空心細嚼溫酒送下以大利為度小便未利臍腹未軟更服附方蔥白一寸去心入硇砂末一錢安蔥心中兩頭以線子系之濕紙包煨熟用冷醇酒送下空心服以效為度論諸病治療交錯致於死候第四十七夫病者有宜湯者有宜丸者有宜散者有宜下者有宜吐者有宜汗者有宜灸者有宜針者有宜補者有宜按摩者有宜導引者有宜蒸尉者有宜澡洗者有宜悅愈者有宜和緩者有宜水者有宜火者種種之法豈能一也若非良善精博難為取愈其庸下識淺亂投湯丸下汗補吐動使交錯輕者令重重者令死舉世皆然且湯可以蕩滌臟腑開通經絡調品陰陽祛分邪惡潤澤枯朽悅養皮膚益充氣力扶助困竭莫離於湯也丸可以逐風冷破堅症消積聚進飲食舒榮衛開關竅緩緩然參合無出於丸也散者能祛風寒暑濕之氣攄寒濕穢毒之邪發揚四肢之壅滯除剪五臟之結伏開腸和胃行脈通經莫過於散也下則疏豁閉塞補則益助虛乏灸則起陰通陽針則行榮引衛導引則可以遂客邪於關節按摩則可以驅浮淫於肌肉蒸尉闢冷暖洗生陽悅愈爽神和緩安氣若實而不下則使人心腹脹滿煩亂鼓腫若虛而不補則使人氣血消散精神耗亡肌肉脫失志意昏迷可汗而不汗則使人毛孔關塞悶絶而終合吐而不吐則使人結胸上喘水食不入而死當灸而不灸則使人冷氣重凝陰毒內聚厥氣上衝分遂不散以致消減當針而不針則使人榮衛不行經絡不利邪漸勝真冒昧而昏宜導引而不導引則使人邪侵關節固結難通宜按摩而不按摩則使人淫隨肌肉久留不消宜蒸尉而不蒸尉則使人冷氣潛伏漸成痹厥宜澡洗而不澡洗則使人陽氣上行陰邪相害不當下而下則使人開腸蕩胃洞泄不禁不當汗而汗則使人肌肉消絶津液枯耗不當吐而吐則使人心神煩亂臟腑奔沖不當灸而灸則使人重傷經絡內蓄炎毒反害中和致於不可救不當針而針則使人氣血散失關機細縮不當導引而導引則使人真氣勞敗邪氣妄行不當按摩而按摩則使人肌肉䐜脹筋骨舒張不當蒸尉而蒸尉則使人陽氣偏行陰氣內聚不當淋泄而淋泄則使人濕侵皮膚熱生肌體不當悅愈而悅愈則使人神失氣消精神不快不當和緩而和緩則使人氣停意此下趙寫本俱缺折健忘傷志大凡治療要合其宜脈狀病候少陳於後凡脈不緊數則勿發其汗脈不疾數不可以下心胸不閉尺脈微弱不可以吐關節不急榮衛不壅不可以針陰氣不盛陽氣不衰勿灸內無客邪勿導引外無淫氣勿按摩皮膚不痹勿蒸尉肌肉不寒勿暖洗神不凝迷勿悅愈氣不急奔勿和緩順此者生逆此者死耳脈病之法備說在前論診雜病必死候第四十八夫人生氣健壯者外色光華內脈平調五臟六腑之氣消耗則脈無所依色無所澤如是者百無一生雖能飲食行立而端然不悟不知死之逼矣實為痛口其大法列之於後病瞪目引水心下牢滿其脈濡而微者死論吐衄瀉血其脈浮大牢數者死病妄言身熱手足冷其脈細微者死病大泄不止其脈緊大而滑者死病頭目痛其脈澀短者死病腹中痛其脈浮大而長者死病腹痛而喘其脈滑而利數而緊者死病四逆者其脈浮大而知者死病耳無聞其脈浮大而澀者死病腦痛其脈緩而大者死左痛右痛上痛下痛者死下痛而脈病者死病厥逆呼之不應脈絶者死病人脈宜大反小者死肥人脈細欲絶者死瘦人脈躁者死人脈本滑利而反澀者死人脈本長而反短者死人尺脈上應寸口太遲者死溫病三四日未汗脈太疾者死溫病脈細微而往來不快胸中閉者死溫病發熱甚脈反小弱者死病甚脈往來不調者死溫病腹中痛下痢者死溫病汗不出出不至足者死病瘧腰脊強急瘛瘲者死病心腹脹滿痛不止脈堅大洪者死痢血不止身熱脈數者死病腹滿四逆脈長者死熱病七八日汗當出反不出脈絶者死熱病七八日不汗躁狂口舌焦黑脈反細弱者死熱病未汗出而脈大盛者死熱病汗出而脈未盡往來轉大者死病咳嗽脈數身瘦者死暴咳嗽脈散者死病咳形肥脈急甚者死病嗽而嘔便滑不禁脈弦欲絶者死病諸嗽喘脈沉而浮者死病上氣脈數者死病肌熱形瘦脫肛熱不去脈甚緊急者死病陽癖轉筋脈極數者死病中風痿疾不仁脈緊急者死病上喘氣急四匝脈澀者死病寒熱瘛瘲脈大者死病金瘡血不止脈大者死病墜損內傷脈小弱者死病傷寒身熱甚脈反小者死病厥逆汗出脈虛而緩者死病洞泄不下食脈急者死病腸澼下白膿者死病腸澼下膿血脈懸絶者死病腸澼下膿血身有寒脈絶者死病咳嗽脈沉堅者死病腸中有積聚脈虛弱者死病水氣脈微而小者死病水脹如鼓脈虛小澀者死病泄注脈浮大而滑者死病內外俱虛臥不得安身冷脈細微嘔而不入食者死病冷氣上攻脈逆而澀者死卒死脈堅而細微者死熱病三五日頭痛身熱食如故脈直而疾者八日死久病脈實者死又虛緩虛微虛滑弦急者死卒病脈弦而數者死凡此凶脈十死十百死百不可治也察聲色形證決死法第四十九凡人五臟六腑榮衛關竅宜平生氣血順度循環無終是為不病之本若有缺絶則禍必來矣要在臨病之時存神內想息氣內觀心不妄視著意精察方能通神明探幽微斷死決生千無一誤死之證兆具之於後黑色起於耳目鼻上漸入於口者死赤色見於耳目額者五日死黑白色入口鼻目中者五日死黑或如馬肝色望之如青近則如黑者死張口如魚出氣不反者死循摸衣縫者死妄語錯亂及不能語者死熱病即不死尸臭不可近者死面目直視者死肩息者一日死面青人中反者三日死面無光牙齒黑者死面青目黑者死面白目黑者十日死面赤眼黃即時死面黑目白者八日死面青目黃者五日死眉系傾者七日死齒忽黑色者三十日死髮直者十五日死遺尿不覺者五六日死唇口乍乾黑者死爪中青黑色死頭目久痛卒視不明者死舌卷卵縮者死面黑直視者死面青目白者死面黃目白者死面目俱白者死面目青黑者死面青唇黑者死發如麻喜怒不調者死發肩如衝起者死面色黑脅滿不能反側者死面色蒼黑卒腫者死掌腫無紋臍腫出囊莖俱腫者死手足爪甲肉黑色者死汗出不流者死唇反人中滿者死陰陽俱絶目匡陷者死五臟內外絶神氣不守其聲嘶者死陽絶陰結精神恍惚撮空裂衣者死陰陽俱閉失音者死榮衛耗散面目浮腫者死心絶於腎肩息回眄目直者一日死肺絶則氣去不反口如魚口者三日死骨絶腰脊痛腎中重不可反側足膝後平者五日死腎絶大便赤澀下血耳干腳浮舌腫者六日死又曰足腫者九日死脾絶口冷足腫脹泄不覺者十二日死筋絶魂驚虛恐手足爪甲青呼罵不休者八九日死肝絶汗出如水恐懼不安伏臥目直面青者八日死又曰即時死胃絶齒落面黃者七日死又曰十日死凡此察聽之更須詳酌者矣
