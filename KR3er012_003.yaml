body:
  text: 卷下療諸病藥方六十道萬應丸甘遂三兩芫花三兩大戟三兩大黃三兩三稜三兩巴豆二兩和皮乾漆二兩炒蓬朮二兩當歸五兩桑皮二兩硼砂三兩澤瀉八兩山梔仁二兩檳榔一兩木通一兩雷丸一兩訶子一兩黑牽牛五兩五靈脂五兩皂角七定去皮弦上件二十味銼碎洗淨入米醋二斗浸三日入銀器或石器內慢火熬令醋盡焙乾焦再炒為黃色存性入後藥木香一兩丁香一兩肉桂一兩去皮肉豆一兩白朮一兩黃耆一兩沒藥一兩附子一兩炮去皮臍茯苓一兩赤芍藥一兩川芎二兩牡丹皮二兩白牽牛二兩乾薑二兩陳皮二兩藝臺二兩炒地黃三兩鱉甲三兩醋炙青皮三兩南星二兩漿水煮軟切焙上二十味通前共四十味同杵羅為末醋煮麵糊為丸如緑豆大用度謹具如下合時須在一淨室中先嚴潔齋心滌慮焚香精誠懇諸方聖者以助藥力尤效速也結胸傷寒用油漿水下七丸當逐下惡物如人行二十里未動再服多年積結殗食癥塊臨臥水下三丸至五丸每夜服之病即止如記得因傷物作積即隨所傷物下七丸小兒妊婦老人勿服水氣通身腫黃者茯苓湯下五丸日二服水消為度如要消酒進食生薑湯下一丸食後腹中一切痛醋湯下七丸膈氣噎病丁香湯下三丸夜一服因傷盛勞鱉甲湯下七丸日三服漸安減服小腸痃癖氣茴香湯下三丸大小便不通蜜湯下五丸未通加至七丸九種心痛茱萸湯下五丸立止尸注走痛木瓜湯下三丸腳氣石楠湯下五丸每日食前服卒死氣未絶小便化七丸灌之立活産後血不行當歸酒下三丸血暈血迷血蠱血痢血脹血刺血塊血積血症血瘕並用當歸酒下二丸逐日服難産橫倒榆白皮湯下二丸胎衣不下燒稱錘通紅以酒淬之帶熱下二丸惟孕婦患不可服産急難方可服之脾瀉血痢乾薑湯下一丸赤白痢甘草乾薑湯下一丸赤痢甘草湯下一丸白痢乾薑湯下一丸胃冷吐逆並反胃吐食丁香湯下二丸卒心腹痛不可忍者熱醋鹽湯下三丸如常服一丸臨臥茶清下五爛疾牛乳下一丸每日二服如發瘧時童子小便酒下十丸化開灌之吐利即愈其效如神療萬病六神丹雄黃一兩研礬石一兩燒巴豆一兩去皮附子一兩炮藜蘆三兩硃砂二兩一兩別研一兩為衣上為未煉蜜為丸如小豆大一等作黍米大男子百疾以飲服二丸小兒量度與小者服得利即瘥安息香丸治傳尸肺痿骨蒸鬼疰卒心腹疼霍亂吐瀉時氣瘴瘧五利血閉痃癖丁腫驚邪諸疾安息香木香麝香犀角沉香丁香檀香香附子訶子硃砂白朮蓽茇以上各一兩乳香龍腦蘇合香以上各半兩上為末煉蜜成劑杵一千下丸如桐子大新汲水化下四丸老幼皆一丸以絳囊子盛一丸彈子大懸衣辟邪毒魍魎甚妙合時忌雞犬婦人見之明月丹治傳尸勞雄黃半兩兔糞二兩輕粉一兩木香半兩天靈蓋一兩炙鱉甲一個大者去裙爛醋炙焦黃上為末醇酒一大升大黃一兩熬膏入前藥末為丸如彈子大硃砂為衣如是傳尸勞肌瘦面黃嘔吐血咳嗽不定者是也先燒安息香令煙起吸之不嗽者非傳尸也不可用此藥若吸煙入口咳嗽不能禁止者乃傳尸也宜用此藥五更初勿令人知以童子小便與醇酒共一盞化一丸服之如人行二十里上吐出蟲其狀若燈心而細長及寸或如爛李又如蝦蟆狀各不同如未效次日再服以應為度仍須初得血氣未盡精神未亂者可用之地黃煎解勞生肌肉進食活血養氣生地黃汁五升生杏仁汁一升薄荷汁一升生藕汁一升鵝梨汁一升法酒二升白蜜四兩生薑汁一升以上同於銀石器中慢火熬成膏卻入後藥柴胡四兩去蘆焙木香四兩人參二兩白茯苓二兩山藥二兩柏子仁二兩遠志二兩去心白朮二兩桔梗二兩枳實二兩麩炒秦艽三兩去蘆麝香二錢另研熟地黃四兩上末入前藥膏中和再入臼中杵三二千下丸如桐子大每服食藥用甘草湯下二十丸食後日三服安即住服起蒸中央湯黃連五兩上㕮咀以醇酒二斗同熬成膏每夜以好酒化下彈子大一丸汗出為度仍服補藥射臍丸補藥麝臍丸麝一枚燒灰地黃洗地骨皮山藥柴胡各一兩白朮活鱉一個重二斤者佳上將鱉入醇酒一方煮令爛熟研細入汁再熬膏入未丸如桐子大酒服二十丸日二夜一蒸謂骨蒸也氣血相摶久而瘦弱遂成勞傷肉消毛落妄血喘咳者是也宜以前法治之太上延年萬勝追魂散人參去蘆柴胡去苗杏仁去皮尖天靈蓋炙各一兩蜀椒一分桃柳心一小握上為末童子小便一升末一兩垍瓶中煎令熟空心日午各進一服經五日效醉仙丹主偏枯不遂皮膚不仁麻黃一升去節水煮去沫焙乾作末南星七個大者大附子三個黑者地龍七條去土上除麻黃外先末之次將麻黃末用醇酒一方熬成膏入末丸如彈子大每服食後臨睡酒化一丸汗出為度偏枯不遂皮膚不仁皆由五臟氣虛風寒暑濕之邪蓄積於中久而不散乃成疾焉以前法主之靈烏丹治一切冷疾疼痛麻痹風氣川烏一斤河水浸七日換水浸去皮尖切片干之牛膝二兩酒浸焙何首烏四兩制如川烏法上為末煉蜜丸如桐子大硃砂為衣空心酒下七丸漸加至十丸病已即止扁鵲玉壺丹駐顏補暖祛萬痛硫黃一斤以桑灰淋濃汁五斗煮硫黃令伏以火煅之研如粉掘一地坑子深二寸許投水在裡候水清取調硫黃末稀稠得所瓷器中煎乾用鏊一個上敷以砂砂上鋪紙鏊下以火煅熱即取硫黃滴其上自然色如玉矣上以新炊飯為丸如麻子大空心食前酒下十丸葛玄真人百補構精丸熟地黃四兩山藥二兩五味子六兩蓯蓉三兩酒浸一宿牛膝二兩酒浸山茱萸一兩澤瀉一兩茯苓一兩去皮遠志一兩去心巴戟天一兩去心赤石脂一兩石膏一兩柏子仁一兩炒杜仲三兩去皮銼碎慢火炒令絲斷上為末煉蜜丸如桐子大空心溫酒下二十丸男子婦人皆可服澀精金鎖丹韭子一斤灑浸三宿濾出焙乾杵為末上用酒糊為丸如桐子大硃砂為衣空心酒下二十丸療百疾延壽酒黃精四斤天門冬三斤松葉六斤蒼朮四斤枸杞子五升上以水三碩煮一日取汁如釀法成空心任意飲之交藤丸駐顏長算祛百疾交藤根一斤紫色者河水浸七日竹刀刮去皮曬乾茯苓五兩牛膝二兩上為末煉蜜搜成劑杵一萬下丸如桐子大紙袋盛之酒下三十丸空心服久服延壽忌豬羊肉天仙丸補男子婦人虛乏天仙子五靈脂各五兩上炒令焦黑色杵末以酒糊為丸如緑豆大食前酒服十五丸左慈真人陸本無此上四字作善養千金地黃煎生地黃一稱取汁於石器中熬成膏入熟乾地黃末看硬軟劑杵千下上丸如桐子大每服二十丸空心服久服斷欲神仙不死取積聚方輕粉粉霜硃砂各半兩巴豆霜二錢半上同研勻煉蜜作劑旋丸如麻子大生薑湯下三丸量虛實加減治癥瘕方大黃濕紙裹煨三稜濕紙裹煨熱銼硼砂研乾漆炒令煙盡巴豆去皮出油以上各一兩為末醋一方熬成膏入後藥木香丁香枳實麩炒去穰桂心各一兩上為末入前項膏子和成劑杵千下為丸如緑豆大飲服三五丸食後服通氣阿魏丸治諸氣不通胸背痛結塞悶亂者悉主之阿魏二兩沉香一兩桂心半兩牽牛末二兩上先用醇酒一升熬阿魏成膏入藥末為丸櫻桃大硃砂為衣酒化一丸治尸厥卒痛方尸厥者謂忽如醉狀肢厥而不省人事也卒痛者謂心腹之間或左右脅下痛不可忍俗謂鬼箭者是雄黃二兩研硃砂二兩研上二味再同研勻用大蒜一頭濕紙裹煨去紙杵為丸櫻桃大每服一丸熱酒化下鬼哭丹主腹中諸痛氣血凝滯飲食未消陰陽痞隔寒熱相乘摶而為痛宜以此方主之川烏十四個生硃砂一兩乳香一分上為末以醋一盞五靈脂末一兩煮糊和丸如桐子大硃砂為衣酒下七丸男子溫酒下女人醋湯下治心痛不可忍者木香蓬朮各一兩乾漆一分炒上為末每服一錢熱醋湯調下入口立止取長蟲兼治心痛方木棗二十一個去核緑礬一兩作二十一塊子填棗中麵裹燒紅去面雷丸七個輕粉一錢木香一錢丁香一錢水銀半兩入鉛半兩溶成砂子上為末取牛肉二兩車脂一兩與肉同銼令爛米醋一升煮肉令成膏入藥同熬硬軟得所入臼中杵三二千下丸如酸棗大丸時先以緋線一條丸在藥中留二尺許作系如有長蟲者五更初油漿水吞下一丸存線頭勿令吞盡候少頃心中痛線動即急拽線令藥出則和蟲出若心氣痛不可忍者熱醋湯化下一丸立止治蟲毒方水銀密陀僧黃丹輕粉大黃丁香訶子雄雀糞各一兩上為末每服二錢用面半兩共水和成油餅食之又法作棋子入漿水煮熱食之破棺丹治陰厥面目俱青心下硬四肢冷脈細欲絶者硫黃一兩無灰酒煮三日三夜如耗旋添暖酒日足取出研為末丹砂一兩研勻細上以酒煮糊為丸如雞頭大有此病者先於淨室中匆令人知度病人長短掘一地坑子深一尺以來用苜蓿火燒令坑子極熱以醋五升沃令氣出內鋪衣被蓋坑以酒化下一丸與病人服之後令病人臥坑內蓋覆少時汗出即扶病者令出無風處蓋覆令病人四肢溫心下軟即漸去衣被令通風然後看虛實調補再生丸起厥死猶暖者巴豆一兩去皮研硃砂一兩細研麝香半兩研川烏尖十四個為末大黃一兩炒取末上件再同研勻煉蜜和丸如桐子大每服三丸水化下折齒灌之立活亦療關膈結胸極效救生丸治卒死大黃四兩輕粉半兩硃砂一兩雄黃一分巴豆七個去皮細研取霜上為末以鯤膽汁和丸如雞頭大童子小便化開一丸斡開口灌之內大蔥一寸許入鼻中如人行五七里當吐出涎即活治脾厥吐瀉霍亂黑附子炮去皮臍入破乾薑炮甘草炙肉豆各一兩印本無此一味有豉等分上為末水半升末四錢印本作二錢棗七個薑一分印本作一錢同煎去半溫服連進三服三生散起卒死兼治陰盛四逆吐瀉不止草烏七個厚朴一尺甘草三寸並生用上為末水一中盞末一錢棗七個煎七分服重者灌之起卒死草憨蔥根二兩瓜蒂一分丁香十四粒上為末吹一字入鼻中男左女右須臾自活身冷強厥者勿活浴腸湯治陽厥發狂將成疽大黃四兩濕紙裹煨大青葉梔子仁甘草各一兩炙上為末水五升末四兩煎減二升內朴硝五合再熬去一升取汁二升分四服量虛實與之大瀉為度如喜水即以水澆之畏水者勿與吃大忌破黃七神丹朴硝二斤硃砂五兩大黃七兩甘遂二兩山梔二兩輕粉一兩豉半斤以絹袋盛之上七味以水二斗熬令水盡除去甘遂豉梔子大黃只取朴硝硃砂輕粉為末以水浸豉汁研勻後入末三味同和煮糯米糊為丸如彈子大新水化一丸吐瀉為度三黃丸治三痟吐血諸黃症黃連三兩黃芩二兩大黃一兩上為末煉蜜為丸如桐子大食後溫水下十五丸量虛實加減服通中延命玄冥煮原砂法活尿血開擁塞解毒治一切熱病風氣腳毒蠱毒硃砂五兩朴硝半稱水煮七遍每遍用水三升水盡為度取霜再入水二升蘇木二兩大黃五兩鬱金三兩山梔二兩人參二兩桑皮二兩甘草五兩上件同熬水盡為度只用硃砂去余藥杵末煉蜜丸桐子大每服二十丸飲下可疏諸毒尤妙治暴熱毒心肺煩而嘔血方大黃二兩為末以地黃汁拌勻濕即焙乾上為末每服二錢地黃汁調下以利為度甘草湯亦得治吐血方蛤粉四兩硃砂一兩上為末新汲水調下五錢未已再服止即已治中暍死心下猶暖起死方上令病者仰面臥取溫水不住手澆淋臍中次以童子小便合生地黃汁灌之自活禁與冷水只與溫熟水飲之玉霜膏治一切熱毒喉閉朴硝一斤牙硝半斤硼砂四兩礬石三兩上為末火熔成汁築一地坑子令實傾入盆覆一夕取杵為末入龍腦二兩研勻新汲水半盞合生蜜調一錢小兒量與服百生方救百物入咽喉鯁欲死者茯苓去皮貫衆甘草上件各等分為末每服一錢米飲調一分立效治喉閉悶氣欲死者上取乾漆燒令煙出竹筒子吸煙吞之立效治漏胎胎損方川芎艾葉各一兩炒阿膠炒白茯苓上末之糯米飲調下二錢匕日七服仍食糯米粥養之治婦人血崩方枳殼一錢麵炒地黃二錢燒醋淬十四次上為末醋湯調下一錢匕連三服效治婦人血閉方乾漆二兩燒生地黃汁五升上熬成膏酒化棗大許空心服三不鳴散治小便不通及五淋取水邊燈下道邊螻蛄各一個三處取三個令相咬取活者一個如後法麝香酒食空下上內於瓶中封之令相噬取活者焙乾余皆為末每服一錢匕溫酒調服立通余皆二字恐誤甘草湯解方藥毒甘草一十二兩上件銼碎水二斗煎至一斗取清溫冷得所服仍儘量服治溺死方取石灰三石露首培之令厚一尺五寸候氣出後以苦葫蘆穰作末如無用瓜蒂上用熱茶調一錢吐為度省事後以糜粥自調之治縊死方先令人抱起解繩不得用刀斷扶於通風處高首臥取草憨蔥根末吹入兩鼻中更令親人吹氣入口候噴出涎即以礬石末取丁香煎湯調一錢匕灌之槐子散治久下血亦治尿血槐用中黑子一升合槐花二升同炒焦上件為末每服二錢用水調下空心食前各一服病已止治腸風下血荊芥穗地黃各二兩甘草半兩上為末每服一錢溫酒調下食後日三夜一治暴喘欲死方大黃一兩牽牛二兩炒上件為細末每服二錢蜜水調下立愈治上熱痰喘極效若虛人肺虛冷者不可用大聖通神乳香膏貼諸毒瘡腫發背癰疽乳香一兩沒藥一兩血竭一兩黃蠟一兩黃丹二兩木鱉二兩去殼烏魚骨二兩海桐皮二兩不灰木四兩瀝青四兩五靈脂二兩麝香二錢膩粉五十個子此必有誤上併為末用好油四兩熬令熱下藥末熬不住手攪之令黑色滴水中成珠即止水澄膏治病同前井泉石白及各一兩龍骨黃柏鬱金各半兩黃蜀葵花一分上六味併為末每服二錢新汲水一盞調藥打令勻伺清澄去浮水攤在紙花上貼之腫毒發背皆治更蘇膏治一切不測惡瘡飲垂垂字恐誤南星一個半夏七個巴豆五個去殼麝香半錢上為細末取臘月豬脂就膏令如不痛瘡先以針刺破候忍痛處使以兒乳汁同調貼之千金膏貼一切惡瘡癱癤定粉南粉膩粉黃丹各一分上為末入麝香一錢研勻油調得所成膏貼定命丸治遠年日近一切惡候漏瘡此藥為末熔開蠟就湯內為條如布針大入內雲母膏貼之雄黃乳香各一分巴豆二十一粒去皮不去油上研如粉入白麵三錢水和丸如小豆或小麥粒大兩頭尖量病淺深內瘡中上用乳香膏貼之效服雲母膏尤佳麝香丸治一切氣漏瘡麝香一分乳香一分巴豆十四粒去皮上為末入棗肉和成劑丸作鋌子看瘡遠近任藥以乳香膏貼之以效為度香鼠散治漏瘡香鼠皮四十九個河中花背者是龍骨半兩蝙蝠二個用心肝黃丹一分麝香一錢乳香一錢燈心草一兩燒灰上入垍閣中泥固濟炭三斤煅火終放冷為末用蔥漿水洗淨以藥貼之立效定痛生肌肉方胭脂一分血竭一兩乳香一分寒水石三兩燒上為末先以溫漿水洗過拭乾敷瘡甚妙又定痛生肌肉方南星一個乳香二錢定粉半兩龍骨半兩不灰木一兩燒過上為末先以溫漿水洗瘡口以軟帛拭乾敷之治白丁增寒喘急昏冒方葶藶大黃各一兩桑白皮茯苓各二兩檳榔七個郁李仁漢防己各三分上件為末每服三錢蜜水調下以疏下惡物為度又取白丁方鉛霜一分膽礬粉霜各一錢蜈蚣一條上件為末先刺令血出內藥米心大以醋麵餅封口立愈治赤丁方黃連大黃各一兩上件為末以生蜜和丸如桐子大每服三十丸溫水下以利為度又取赤丁方杏仁七個生用上件嚼爛漱之令津滿口吐出線濾汁入輕粉少許調勻以雞羽掃之治黃丁方巴豆七個去心膜青州棗七個去核安巴豆在棗內以麵裹煨通赤上件為末以硼砂醋作面糊為丸如緑豆大每服五丸至十丸米飲下以利為度又取黃丁方六本元控一行黃柏三兩鬱金半兩上件為細末以雞子清調雞羽掃上治黑丁方菟絲子菖蒲上二味等分為末酒浸取汁掃丁上更服腎氣丸補之治青丁方穀精草蟬殼各一兩蒼朮五兩上為末每服一錢水調服食前仍以針刺丁出用桑柴灰汁洗之立效以上八方六本在中卷四十論後印本無此方今附下卷之末
