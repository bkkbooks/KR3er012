body:
  text: 卷上人法於天地論第一人者上稟天下委地陽以輔之陰以佐之天地順則人氣泰天地逆則人氣痞是以天地有四時五行寒暄動靜其變也喜為雨怒為風結為霜張為虹此天地之常也人有四肢五臟呼吸寤寐精氣流散行為榮張為氣發為聲此人之常也陽施於形陰慎於精天地之同也失其守則蒸而熱發痞而寒生結作癭瘤陷作癰疽盛而為喘減而為枯彰於面部見於形體天地通塞一如此矣故五緯盈虧星辰差忒日月交蝕彗孛飛走乃天地之災怪也寒暄不時則天地之蒸否也土起石立則天地之癰疽也暴風疾雨則天地之喘乏也江河竭耗則天地之枯焦也鑑者決之以藥濟之以針化之以道佐之以事故形體有可救之病天地有可去之災人之危厄死生稟於天地陰之病也來亦緩而去亦緩陽之病也來亦速而去亦速陽生於熱熱而舒緩陰生於寒寒則拳急寒邪中於下熱邪中於上飲食之邪中於中人之動止本乎天地知人者有驗於天知天者必有驗於人天合於人人法於天見天地逆從則知人衰盛人有百病病有百候候有百變皆天地陰陽逆從而生苟能窮究乎此如其神耳陰陽大要調神論第二天者陽之宗地者陰之屬陽者生之本陰者死之基天地之間陰陽輔佐者人也得其陽者生得其陰者死陽中之陽為高真陰中之陰為幽鬼故鍾於陽者長鍾於陰者短多熱者陽之主多寒者陰之根陽務其上陰務其下陽行也速陰行也緩陽之體輕陰之體重陰陽平則天地和而人氣寧陰陽逆則天地否而人氣厥故天地得其陽則炎熾得其陰則寒凜陽始於子前末於午後陰始於午後末於子前陰陽盛衰各在其時更始更末無有休息人能從之亦智也金匱曰秋首養陽春首養陰陽勿外閉陰勿外侵火出於木水生於金水火通濟上下相尋人能循此永不湮沉此之謂也嗚呼凡愚豈知是理舉止失宜自致其罹外以風寒暑濕內以飢飽勞役為敗欺殘正體消亡正神縛絆其身死生告陳殊不知脈有五死氣有五生陰家脈重陽家脈輕陽病陰脈則不永陰病陽脈則不成陽候多語陰症無聲多語者易濟無聲者難榮陽病則旦靜陰病則夜寧陰陽運動得時而行陽虛則暮亂陰虛則朝爭朝暮交錯其氣厥橫死生致理陰陽中明陰氣下而不上曰斷絡陽氣上而不下曰絶經陰中之邪曰濁陽中之邪曰清火來坎戶水到離扃陰陽相應方乃和平陰不足則濟之以水母陽不足則助之以火精陰陽濟等各有攀陵上通三寸曰陽之神路下通三寸曰陰之鬼程陰常宜損陽常宜盈居之中者陰陽勻停是以陽中之陽天仙賜號陰中之陰下鬼持名順陰者多消滅順陽者多長生逢斯妙趣無所不靈生成論第三陰陽者天地之樞機五行者陰陽之終始非陰陽則不能為天地非五行則不能為陰陽故人者成於天地敗於陰陽也由五行逆從而生焉天地有陰陽五行人有血脈五臟五行者金木水火土也五臟者肺肝心腎脾也金生水水生木木生火火生土土生金則生成之道循環無窮肺生腎腎生肝肝生心心生脾脾生肺上下榮養無有休息故金匱至真要論云心生血血為肉之母脾生肉肉為血之舍肺屬氣氣為骨之基腎應骨骨為筋之本肝系筋筋為血之源五臟五行相成相生晝夜流轉無有始終從之則吉逆之則凶天地陰陽五行之道中含於人人得者可以出陰陽之數奪天地之機悅五行之要無終無始神仙不死矣陽厥論第四驟風暴熱雲物飛揚晨晦暮晴夜炎晝冷應寒不寒當雨不雨水竭土壞時歲大旱草木枯悴江河乏涸此天地之陽厥也暴壅塞忽喘促四肢不收二腑不利耳聾目盲咽乾口焦舌生瘡鼻流清涕頰赤心煩頭昏腦重雙睛似火一身如燒素不能者乍能素不欲者乍欲登高歌笑棄衣奔走狂言妄語不辨親疏發躁無度飲水不休胸膈膨脹腹與脅滿悶背疽肉爛煩潰消中食不入胃水不穿腸驟腫暴滿叫呼昏冒不省人事疼痛不知去處此人之陽厥也陽厥之脈舉按有力者生絶者死陰厥論第五飛霜走雹朝昏暮靄雲雨飄颻風露寒冷當熱不熱未寒而寒時氣霖霪泉生田野山摧地裂土壞河溢月晦日昏此天地之陰厥也暴啞卒寒一身拘急四肢拳攣唇青面黑目直口噤心腹滿痛頭頷搖鼓腰腳沉重語言謇澀上吐下瀉左右不仁大小便活吞吐酸淥悲憂慘戚喜怒無常者此人之陰厥也陰厥之脈舉指弱按指大者生舉按俱絶者死一身悉冷額汗自出者亦死陰厥之病過三日勿治陰陽痞格論第六陽氣上而不下曰痞陰氣下而不上亦曰痞陽氣下而不上曰格陰氣上而不下亦曰格痞格者謂陰陽不相從也陽奔於上則燔脾肺生其疽也其色黃赤皆起於陽極也陰走於下則冰腎肝生其厥也其色青黑皆發於陰極也疽為黃疽也厥為寒厥也由陰陽痞格不通而生焉陽燔則治以水陰厥則助以火乃陰陽相濟之道耳寒熱論第七人之寒熱往來者其病何也此乃陰陽相勝也陽不足則先寒後熱陰不足則先熱後寒又上盛則發熱下盛則發寒皮寒而燥者陽不足皮熱而燥者陰不足皮寒而寒者陰盛也皮熱而熱者陽盛也發熱於下則陰中之陽邪也發熱於上則陽中之陽邪也寒起於上則陽中之陰邪也寒起於下則陰中之陰邪也寒而頰赤多言者陽中之陰邪也熱而面青多言者陰中之陽邪也寒而面青多言者陰中之陰邪也若不言者不可治也陰中之陰中者一生九死陽中之陽中者九生一死陰病難治陽病易醫診其脈候數在上則陽中之陽也數在下則陰中之陽也遲在上則陽中之陰也遲在下則陰中之陰也數在中則中熱遲在中則中寒寒用熱取熱以寒攻逆順之法從乎天地本乎陰陽也天地者人之父母也陰陽者人之根本也未有不從天地陰陽者也從者生逆者死寒之又寒熱之又熱者生金匱大要論云夜發寒者從夜發熱者逆晝發熱者從晝發寒者逆從逆之兆亦在乎審明虛實大要論第八病有臟虛臟實腑虛腑實上虛上實下虛下實狀各不同宜深消息腸鳴氣走足冷手寒食不入胃吐逆無時皮毛憔悴肌肉皺皴耳目昏塞語聲破散行步喘促精神不收此五臟之虛也診其脈舉指而活按之而微看任何部以斷其臟也又按之沉小弱微短澀軟濡俱為臟虛也虛則補益治之常情耳飲食過多大小便難胸膈滿悶肢節疼痛身體沉重頭目昏眩唇腫脹咽喉閉塞腸中氣急皮肉不仁暴生喘乏偶作寒熱瘡疽並起悲喜時來或自痿弱或自高強氣不舒暢血不流通此臟之實也診其脈舉按俱盛者實也又長浮數疾洪緊弦大俱曰實也看在何經而斷其臟也頭疼目赤皮熱骨寒手足舒緩血氣壅塞丹瘤更生咽喉腫痛輕按之痛重按之快食飲如故曰腑實也診其脈浮而實大者是也皮膚瘙癢肌肉䐜脹食飲不化大便滑而不止診其脈輕手按之得滑重手按之得平此乃腑虛也看在何經而正其時也胸膈痞滿頭目碎痛飲食不下腦項昏重咽喉不利涕唾稠黏診其脈左右寸口沉結實大者上實也頰赤心忪舉動顫栗語聲嘶嘎唇焦口乾喘乏無力面少顏色頤頷腫滿診其左右寸脈弱而微者上虛也大小便難飲食如故腰腳沉重臍腹疼痛診其左右手脈尺中脈伏而澀者下實也大小便難飲食進退腰腳沉重如坐水中行步艱難氣上奔沖夢寐危嶮診其左右尺中脈滑而澀者下虛也病人脈微澀短小俱屬下虛也上下不寧論第九脾病者上下不寧何謂也脾上有心之母下有肺之子心者血也屬陰肺者氣也屬陽脾病則上母不寧母不寧則為陰不足也陰不足則發熱又脾病則下子不寧子不寧則為陽不足也陽不足則發寒脾病則血氣俱不寧血氣不寧則寒熱往來無有休息故脾如瘧也謂脾者土也心者火也肺者金也火生土土生金故曰上有心母下有肺子脾居其中病則如斯耳他臟上下皆法於此也脈要論第十脈者乃氣血之先也氣血盛則脈盛氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血微則脈弱氣血平則脈緩又長人脈長短人脈短趙寫本起性急則脈急性急則脈急性緩則脈緩反此者逆順此者從也又諸數為熱諸遲為寒諸緊為痛諸浮為風諸滑為虛諸伏為聚諸長為實諸短為虛又短澀沉遲伏皆屬陰數滑長浮緊皆屬陽陰得陰者從陽得陽者順違之者逆陰陽消息以經而處之假令數在左手得之浮者熱入小腸得之沉者熱入於心余皆仿此五色一作絶脈論第十一面青無右關脈者脾絶也面赤無右寸脈者肺絶也面白無左關脈者肝絶也面黃無左尺脈者腎絶也面黑無左寸脈者心絶也五絶者死夫五絶當時即死非其時則半歲死然五色雖見而五脈不見即非病者矣以下趙寫本缺脈病外內證決論第十二病風人脈腎數浮沉有汗出不止呼吸有聲者死不然則生病氣人一身悉腫四肢不收喘無時厥逆不濕脈候沉小者死浮大者生病勞人脫肛骨肉相失聲散嘔血陽事不禁夢寐交侵呼吸不相從晝涼夜熱者死吐膿血者亦死其脈不數有根蒂者及頰不赤者生病腸澼者下膿血病人脈急皮熱食不入腹脹目瞪者死或一身厥冷脈沉細而不生者亦死食如故脈沉浮有力而不絶者生病熱人四肢厥脈弱不欲見人食不入利下不止者死食入四肢溫脈大語狂無睡者生病寒人狂言不寐身冷脈數喘息目直者死脈有力而不喘者生陽病人此篇精神顛倒以上趙寫本亦缺精神顛倒寐而不惺言語失次脈候浮沉有力者生無力及食不入胃下利不定者死久病人脈大身瘦食不充腸言如不病坐臥困頓者死若飲食進退脈小而有力言語輕嘶額無黑氣大便結澀者生大凡陽病陰證陰病陽證身瘦脈大肥人脈衰上下交變陰陽顛倒冷熱相乘皆屬不吉從者生逆者死治療之法宜深消息生死要論第十三凡不病而五行絶者死不病而性變者死不病而暴語妄者死不病而暴不語者死不病而暴喘促者死不病而暴強厥一作中者死不病而暴目盲者死不病而暴耳聾者死不病而暴痿緩者死不病而暴腫滿者死不病而暴大小便結者死不病而暴無脈者死不病而暴昏冒如醉者死此皆內氣先盡一作絶故也逆者即死順者二年無有生者也病有災怪論第十四病有災怪何謂也病者應寒而反熱應熱而反寒應吐而不吐應瀉而不瀉應汗而不汗應語而不語應寐而不寐應水而不水皆屬災怪也此乃五臟之氣不相隨從而致之矣四逆者不治四逆者謂主客運氣俱不得時也水法有六論第十五病起於六腑者陽之系也陽之發也或上或下或內或外或蓄在中行之極也有能歌笑者有能悲泣者有能奔走者有能呻吟者有自委曲者有自高賢者有寤而不寐者有能食而不便利者有不能食而便自利者有能言而聲清者有不能言而聲昧者狀各不同皆生六腑也喜其通者因以通之喜其塞者因以塞之喜其水者以水濟之喜其冰者以冰助之病者之樂慎勿違背亦不可強抑之也如此從順則十生其十百生其百疾無不愈矣火法有五論第十六病起於五臟者皆陰之屬也其發也或偏枯或痿躄或外寒而內熱或外熱而內寒或心腹膨脹或手足拳攣或口眼不正或皮膚不仁或行步艱難或身體強硬或吐瀉不息或疼痛不寧或暴無語或久無音綿綿默默狀若死人如斯之候備出於陰陰之盛也陽必不足陽之盛也陰必不盈故前論雲陽不足則助之以火精陰不足則濟之以水母者是也故喜其汗者汗之喜其溫者溫之喜其熱者熱之喜其火者火之喜其湯者湯之溫熱湯火亦在其宜慎勿強之如是則萬全其萬水火之法真陰陽也治救之道當詳明矣風中有五生死論第十七風中有五者謂肝心脾肺腎也五臟之中其言生死狀各不同心風之狀一作候汗自出而好偃仰臥不可轉側言語狂妄若唇正赤者生宜於心俞灸之若唇面或青或黃或白或黑其色不定眼瞤動不休者心絶也不可救過五六日即死耳肝風之狀青色圍目連額上但坐不得倨僂者可治若喘而目直視唇面俱青者死肝風宜於肝俞灸之脾風狀一身通黃腹大而滿不嗜食四肢不收持若手足未青而面黃者可治不然即死脾風宜於脾俞灸之腎風之狀但踞坐而腰腳重痛也視其脅下未生黃點者可治不然即死矣腎風宜灸腎俞穴也肺風之狀胸中氣滿冒昧汗出鼻不聞香臭喘而不得臥者可治若失血及妄語者不可治七八日死肺風宜於肺俞灸之凡診其脈滑而散者風也緩而大浮而緊一作虛軟而弱皆屬風也中風之病鼻下赤黑相兼吐沫而身直者七日死也又中風之病口噤筋急脈遲者生脈急而數者死又心脾俱中風則舌強不能言也肝腎俱中風則手足不遂也風之厥皆由於四時不從之氣故為病焉有癮疹者有偏枯者有失音者有歷節者有顛厥者有疼痛者有聾瞽者有瘡癩者有脹滿者有喘乏者有赤白者有青黑者有瘙癢者有狂妄者皆起於風也其脈浮虛者自虛而得之實大者自實而得之弦緊者汗出而得之喘乏者飲酒而得之癲厥者自勞而得之手足不中者言語謇澀者房中而得之癮疹者自痹一作卑濕而得之歷節疼痛者因醉犯房而得之聾瞽瘡癩者自五味飲食冒犯禁忌而得之千端萬狀莫離於五臟六腑而生矣所使之候配以此耳績聚癥瘕雜蟲論第十八積聚癥瘕雜蟲者皆五臟六腑真氣失而邪氣並遂乃生焉久之不除也或積或聚或癥或瘕或變為蟲其狀各異有能害人者有不能害人者有為病緩者有為病速者有疼者有癢者有生頭足者有如杯塊者勢類不同蓋因內外相感真邪相犯氣血熏摶交合而成也積者繫於臟也聚者繫於腑也癥者繫於氣也瘕者繫於血也蟲者乃血氣食物相感而化也故積有五聚有六癥有十二瘕有八蟲有九其名各不同也積有心肝脾肺腎也聚有大腸小腸膽胃膀胱三焦之六名也癥有勞氣冷熱虛實風濕食藥思憂之十二名也瘕有青黃燥血脂狐蛇鱉之八名也蟲有伏蛇白肉肺胃赤弱蟯之九名也為病之說出於諸論治療之法皆具於後勞傷論第十九勞者勞於神氣也傷者傷於形容也飢飽無度則傷脾思慮過度則傷心色欲過度則傷腎起居過常則傷肝喜怒悲愁過度則傷肺又風寒暑濕則傷於外飢飽勞役則敗於內晝感之則病榮夜感之則病衛榮衛經行內外交運而各從其晝夜也勞於一一起為二二傳於三三通於四四干於五五復犯一一至於五邪乃深藏真氣自失使人肌肉消神氣弱飲食減行步艱難及其如此雖司命亦不能生也故調神氣論曰調神氣慎酒色節起居省思慮薄滋味者長生之大端也診其脈甚數一作數甚餘下仿此甚急甚細甚弱甚微甚澀甚滑甚短甚長甚浮甚沉甚緊甚弦甚洪甚實皆生於勞傷傳尸論第二十傳尸者非一門相染而成也人之血氣衰弱臟腑虛羸中於鬼氣因感其邪遂成其疾也其候或咳嗽不已或胸膈妨悶或肢體疼痛或肌膚消瘦或飲食不入或吐利不定或吐膿血或嗜水漿或好歌詠或愛悲愁或癲風一作狂發歇或便溺艱難或因酒食而遇或因風雨而來或問病弔喪而得或朝走暮遊而逢或因氣聚或因血行或露臥于田野或偶會於園林鍾此病死之氣染而為疾故曰傳尸也治療之方備於篇末論五臟六腑虛實寒熱生死逆順之法第二十一夫人有五臟六腑虛實寒熱生死逆順皆見於形證脈氣若非診察無由識也虛則補之實則瀉之寒則溫之熱則涼之不虛不實以經調之此乃良醫之大法也其於脈證具如篇末論肝臟虛實寒熱生死逆順脈證之法第二十二肝者與膽為表裡足厥陰少陽是其經也旺於春春乃萬物之始生其氣嫩而軟虛而寬故其脈弦軟不可發汗弱則不可下弦長曰平反此曰病脈虛而弦是謂太過病在外太過則令人善忘忽忽眩冒實而微是謂不及病在內不及則令人胸痛引兩脅脹滿大凡肝實則引兩脅下痛引小腹令人本無此五字喜怒虛則如人將捕之其氣逆則頭痛耳聾頰赤一作腫其脈沉之而急浮之亦然主脅肋一作支滿小便難頭痛目眩其脈急甚惡言微急氣在胸脅下緩甚嘔逆微緩水痹大急內癰吐血微大筋痹小甚多飲微大本作小消疸本作痹滑甚頽疝微滑遺溺澀甚流飲微澀瘲攣變也本無此二字又肝之積氣在脅久不發為咳逆或為痎瘧也虛則夢花草茸茸實則夢山林茂盛肝之病旦喜一作慧晚甚夜靜肝病則頭痛脅痛本無此二字目眩肢滿囊縮小便不通一作利十日死又身熱惡寒四肢不舉其脈當弦長而急反短而澀乃金刻木也十死不治又肝中寒則兩臂痛不能舉舌本燥多太息胸中痛不能轉側其脈左關上遲而澀者是也肝中熱則喘滿而多怒目疼腹脹滿不嗜食所作不定睡中驚悸眼赤視不明其脈左關陰實者是也肝虛冷則脅下堅痛目盲臂痛發寒熱如瘧狀不欲食婦人則月水不來而氣急其脈左關上沉而弱者是也論膽虛實寒熱生死逆順脈證之法第二十三膽者中正之腑也號曰將軍決斷出焉言能喜怒剛柔也與肝為表裡足少陽是其經也虛則傷寒寒則恐畏頭眩不能獨臥實則傷熱熱則驚悸精神不守臥起不寧又玄水發則其根在於膽先從頭面起腫至足也又肝咳久不已則傳邪入於膽嘔清苦汁也又膽病則喜太息口苦嘔清汁一作宿汁心中淡淡恐如人將捕之咽中介介然數唾又膽脹則舌一作脅下痛口苦太息也邪氣客於膽則夢鬥訟其脈診在左手關上浮而得之者是其部也膽實熱則精神不守又膽熱則多睡膽冷則無眠又左關上脈陽微者膽虛也陽數者膽實也陽虛者膽絶也論心臟虛實寒熱生死逆順脈證之法第二十四心者五臟之尊號帝王之稱也與小腸為表裡神之所舍又主於血屬於火旺於夏手少陰是其經也凡夏脈鉤來盛去衰故曰鉤反此者病來盛去亦盛此為太過病在外來衰去盛此為不及病在內太過則令人身熱而骨痛口瘡舌焦引水不及則令人煩躁一作心上為咳唾下為氣泄其脈來纍纍如連珠如循琅玕曰平脈來纍纍一本無此四字卻作喘喘連屬其中微曲曰病來前曲後倨如操帶鉤曰死又思慮過多則怵惕怵惕傷心心傷則神失神失則恐懼又真心痛手足寒過節五寸則旦得夕死夕得旦死又心有水氣則痹氣滯身腫不得臥煩而躁其陰腫也又心中風則翕翕一作吸發熱不能行立心中飢而不能食食則吐嘔夏心旺左手寸口脈洪浮大而散曰平反此則病若沉而滑者水來剋火十死不治弦而長者木來歸子其病自愈緩而大者土來入火為微邪相干無所害又心病則胸中痛四一作脅肢滿脹肩背臂膊皆痛虛則多驚悸惕惕然無眠胸腹及腰背引痛喜一作善悲時眩僕心積氣久不去則苦憂煩心中痛實則喜笑不息夢火發心氣盛則夢喜笑及恐畏邪氣客於心則夢山邱煙火心脹則心煩短氣夜臥不寧心腹痛懊憹腫氣來往上下行痛有時休作心腹中熱喜水涎出是蚖蛟蚖恐是蛔字蛟恐是咬字心也心病則曰中慧夜半甚平旦靜又左手寸口脈大甚則手內熱赤一作服腫太甚則胸中滿而煩淡淡面赤目黃也又心病則先心痛而咳不止關膈一作格不通身重不已三日死心虛則畏人瞑目欲眠精神不倚魂魄妄亂心脈沉小而緊浮主氣喘若心下氣堅實不下喜咽乾手熱煩滿多忘太息此得之思憂太過也其脈急甚則發狂笑微緩則吐血大甚則喉閉一作痹微大則心痛引背善淚出小甚則噦微小則笑消疸一作痹滑甚則為渴微滑則心疝引臍腹一作腸鳴澀甚則喑不能言微澀則血溢手足厥耳鳴癲疾又心脈摶堅而長主舌強不能語一作言軟而散當懾怯不食也又急甚則心疝臍下有病形煩悶少氣大熱上煎又心病狂言汗出如珠身厥冷其脈當浮而大反沉濡而滑甚色當赤今反黑者水剋火十死不治又心之積沉之而空空然時上下往來無常處病胸滿季腰腹中熱頰一作面赤咽乾心煩掌中熱甚則嘔血夏瘥本作春瘥冬甚宜急療之止於旬日也又赤黑色入口必死也面黃目赤者亦一作不死赤如衃血亦死又憂恚思慮太過心氣內索其色反和而盛者不出十日死扁鵲曰心絶則一日死色見凶多而人雖健敏名為行尸一歲之中禍必至矣又其人語聲前寬而後急後聲不接前聲其聲濁惡其口不正冒昧喜笑此風入心也又心傷則心壞為水所乘身體手足不遂骨節解舒緩不自由下利無休息此疾急宜治之不過十日而亡也又笑不待呻而復憂此水乘火也陰繫於陽陰起陽伏伏則生熱熱則生狂冒昧妄亂言語錯誤不可採問一作聞心已損矣扁鵲曰其人唇口赤即可治青黑即死又心瘧則先煩一作顫而後渴翕翕發熱也其脈浮緊而大者是也心氣實則小便不利腹滿身熱而重溫溫欲吐吐而不出喘息急不安臥其脈左寸口與人迎皆實大者是也心虛則恐懼多驚憂思不樂胸腹中苦痛言語戰栗惡寒恍惚面赤目黃喜衄血診其脈左右寸口兩虛而微者是也論小腸虛實寒熱生死逆順脈證之法第二十五小腸者受盛之腑也與心為表裡手太陽是其經也心與一本無此二字小腸絶者六日死絶則髮直如麻汗出不已不得屈伸者是也又心咳本作病久不已本無此二字則傳小腸小腸咳則氣咳俱出也小腸實則傷熱熱則口生瘡虛則生寒寒則泄濃血或泄黑水其根在小腸也又小腸寒則下腫重有熱久不出則漸生痔疾有積則當暮發熱明旦而止也病氣發則令人腰下重食則窘迫而便難是其候也小腸脹則小腹䐜脹引腹而痛也厥邪入小腸則夢聚井邑中或咽痛頷腫不可回首肩如杖一作拔腳如折也又黃帝曰心者主也神之舍也其臟周密而不傷傷神去神去則身亡矣故人心多不病病即死不可治也惟小腸受病多矣又左手寸口陽絶者無小腸脈也六日死病臍痹小腹中有疝瘕也左手寸口脈實大者小腸實也有熱邪則小便赤澀又實熱則口生瘡身熱去來心中煩滿體重又小腸主於舌之官也和則能言而機關利健善別其味也虛則左寸口脈浮而微軟弱不禁按病為驚狂無所守下空空然不能語者是也論脾臟虛實寒熱生死逆順脈證之法第二十六脾者土也諫議之官主意與智消磨五穀寄在其中養於四旁旺於四季正旺長夏與胃為表裡足太陰是其經也扁鵲曰脾病則面色萎黃實則舌強直不嗜食嘔逆四肢緩虛則精不勝元氣乏失溺不能自持其脈來似水之流曰太過病在外其脈來如鳥之距曰不及病在內太過則令人四肢沉重語言謇澀不及令人中滿不食乏力手足緩弱不遂涎引口中一作出四肢腫脹溏瀉一作泄不時夢中飲食脾脈來而和柔去似雞距踐地曰平脈來實而滿稍數如雞舉足曰病又如烏一作雀之啄如鳥之距如屋之漏曰死中風則翕翕發熱狀若醉人腹中煩滿皮肉瞤瞤短氣者是也旺時其脈阿阿然緩曰平反弦急者肝來克脾真鬼相遇大凶之兆反微澀而短者肺來乘脾不治而自愈反沉而滑者腎來從脾亦為不妨反浮而洪心來生脾不為疾耳脾病面黃體重失便目直視唇反張手足爪甲青四肢逆吐食百節疼痛不能舉其脈當浮大而緩今反弦急其色當黃而反青此十死不治也又脾病其色黃飲食不消心腹脹滿身體重肢節痛大便硬小便不利其脈微緩而長者可治脾氣虛則大便滑小便利汗出不止五液注下為五色注利下也此四字疑是注文又積久不愈則四肢不收黃疸飲食不為肌膚氣滿脹而喘不定也又脾實則時夢築垣牆蓋屋脾盛則夢歌樂虛則夢飲食不足厥邪客於脾則夢大澤邱陵風雨壞屋脾脹則善噦四肢急體重不食善噫脾病則日昳慧平旦甚日中持下晡靜脈急甚則瘛瘲微急則胸膈中不利食入而還出脈緩盛則痿厥微緩則風痿四肢不收大甚則擊僕微大則脾疝氣里大膿血在胃腸之外小甚則寒熱作微小則消疸滑甚則頽疝微滑則蟲毒腸鳴中熱澀甚則腸㿗微澀則內潰下膿血脾脈之至也大而虛則有積氣在腹中有厥氣名曰厥疝女子同法得之四肢汗出當風也脾絶則十日死又臍出一作凸者亦死唇焦枯無紋理而青黑者脾先絶也脾病面黃目赤者可治青黑色入口則半歲死色如枳實者一一作半月死吉凶休否一作咎皆見其色出於部分也又口噤唇黑四肢重如山不能自收持大小便利無休歇食飲不入七日死又唇雖痿黃語聲囀囀者可治脾病瘧氣久不去腹中痛鳴徐徐熱汗出其人本意寬緩今忽反常而嗔怒正言而鼻笑不能答人者此不過一月禍必至矣又脾中寒熱則皆使人腹中痛不下食又脾病則舌強語澀轉筋卵縮牽陰股引髀痛身重不思食鼓脹變則水泄不能臥者死不治也脾正熱則面黃目赤季脅痛滿也寒則吐涎沫而不食四肢痛滑泄不已手足厥甚則顫栗如瘧也臨病之時要在明證詳脈然後投湯丸求其痊損耳論胃虛實寒熱生死逆順脈證之法第二十七胃者腑也又名水穀之海至脾為表裡胃者人之根本也胃氣壯則五臟六腑皆壯足陽明是其經也胃氣絶則五日死實則中脹便難肢節疼痛不下食嘔吐不已虛則腸鳴脹滿引水滑泄寒則腹中痛不能食冷物熱則面赤如醉人四肢不收持不得安臥語狂目亂便硬者是也病甚則腹脅脹滿吐逆不入食當心痛上下不通惡聞食臭嫌人語振寒喜伸缺胃中熱則唇黑熱甚則登高而歌棄衣而走顛狂不定汗出額上鼽衄不止虛極則四肢腫滿胸中短氣穀不化中消也胃中風則溏泄不已胃不足則多飢不消食病人鼻下平則胃中病渴者不可治一本無上十三字作微燥而渴者可治胃脈博堅而長其色黃赤者當病折腰一作髀其脈軟而散者病食痹左關上脈浮而大者虛也浮而短澀者實也浮而微滑者亦虛也浮而遲者寒也浮而數者實也虛實寒熱生死之法察而端謹則成神妙也論肺臟虛實寒熱生死逆順脈證之法第二十八肺者魄之舍生氣之源號為上將軍乃五臟之華蓋也外養皮毛內榮腸胃與大腸為表裡手太陰是其經也肺氣通於鼻和則能知香臭矣有寒則善咳本作有病則喜咳實則鼻流清涕凡虛實寒熱則皆使人喘嗽實則夢刀兵恐懼肩息胸中滿虛則寒生一作熱咳一作喘息利下少氣力多悲感旺於秋其脈浮而毛曰平又浮而短澀者肺脈也其脈來毛而中央堅兩頭一作傍虛曰太過病在外其脈來毛而微曰不及病在內太過則令人氣逆胸滿背痛不及則令人喘呼而咳一作嗽上氣見血下聞病音又肺脈厭厭聶聶如落榆莢曰平來不上不下如循雞羽曰病來如物之浮如風吹鳥背上毛者死真肺脈至大而虛又如以毛羽中人皮膚其色赤其毛折者死又微毛曰平毛多曰病毛而眩者曰春病眩甚曰即病又肺病吐衄血皮熱脈數頰赤者死也又久咳而見血身熱而短氣脈當澀今反浮大色當白今反赤者火剋金十死不治也肺病喘咳身但寒無熱脈遲微者可治秋旺於肺其脈當浮澀而短曰平而反洪大而長是火刑金亦不可治又得軟而滑者腎來乘肺不治自愈反浮大而緩者是脾來生肺不治而瘥反弦而長者是肺被肝從為微邪雖病不妨虛則不能息耳重嗌乾喘咳上氣胸背痛有積則脅下脹滿中風則口燥而喘身運而重汗出而冒悶其脈按之虛弱如蔥葉下無根者死中熱則唾血其脈細緊浮數芤滑皆失血病此由燥擾嗔怒勞傷得之氣壅結所為也肺脹則其人喘咳而目如脫其脈浮大者是也又肺痿則吐涎沫而咽乾欲飲者為愈不飲則未瘥又咳而遺溺者上虛不能制下也其脈沉濁者病在內浮清者病在外肺死則鼻孔開而黑枯喘而目直視也又肺絶則十二日死其狀足滿瀉痢不覺出也面白目青此謂亂經此雖天命亦不可治又飲酒當風中於肺則咳嗽喘悶見血者不可治無血者可治面黃目白者可治肺病頰赤者死又言音喘急短氣好唾一作睡此為真鬼相害十死十百死百大逆之兆也又陽氣上而不降燔於肺肺自結邪脹滿喘急狂言瞑目非常所說而口鼻張大小便頭俱脹飲水無度此因熱傷於肺肺化為血不可治則半歲死又肺瘧使人心寒寒甚則發熱寒熱往來休作不定多驚咳喘如有所見者是也其脈浮而緊又滑而數又遲澀而小皆為肺瘧之脈也又其人素聲清而雄者暴不響亮而拖氣用力言語難出視不轉睛雖未為病其人不久又肺病實則上氣喘急咳嗽身熱脈大也虛則力乏喘促右脅脹語言氣短一作促者是也又乍寒乍熱鼻塞頤赤面白皆肺病之候也論大腸虛實寒熱生死逆順脈證之法第二十九大腸者肺之腑也為傳送之司號監倉之官肺病久不已則傳入大腸手陽明是其經也寒則泄熱則結絶則泄利無度利絶而死也熱極則便血又風中大腸則下血又實熱則脹滿而大便不通虛寒則滑泄不定大腸乍虛乍實乍來乍去寒則溏泄熱則垢重有積物則寒栗而發熱有如瘧狀也積冷不去則當臍而痛不能久立痛已則泄白物是也虛則喜滿喘咳而喉咽中如核妨矣
