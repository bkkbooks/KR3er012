front:
  text: 附錄一序華先生諱佗字元化性好恬淡喜味方書多遊名山幽洞往往有所遇一日因酒息於公宜山古洞前忽聞人論療病之法先生訝其異潛逼洞竊聽須臾有人云華生在邇術可付焉復有一人曰道生性貪不憫生靈安得付也先生不覺愈駭躍入洞見二老人衣木皮頂草冠先生躬趨左右而拜曰適聞賢者論方術遂乃忘歸況濟人之道素所好為所恨者未遇一法可以施驗徒自不足耳願賢者少察愚誠乞與開悟終身不負恩首坐先生云術亦不惜恐異日與子為累若無高下無貧富無貴賤不務財賄不憚勞苦矜老恤幼為急然後可脫子禍先生再拜謝曰賢聖之語一一不敢忘俱能從之二老笑指東洞云石床上有一書函子自取之速出吾居勿示俗流宜秘密之先生時得書回首已不見老人先生懾怯離洞忽然不見云奔雨瀉石洞摧塌既覽其方論多奇怪從茲施試效無不存神先生未六旬果為魏所戮老人之言預有斯驗余乃先生外孫也因吊先生寢室夢先生引余坐語中藏經真活人法也子可取之勿傳非人余覺驚怖不定遂討先生舊物獲石函一具開之得書一帙乃中藏經也予性拙於用復授次子思因以志其實甲寅秋九月序此序趙寫本所無似是後人偽作姑附存之
