body:
  text: 附錄二跋余少讀華佗傳駭其醫之神奇而惜其書之火於獄使之尚存若刳腹斷臂之妙又非紙上語所能道也古汴陸徒老近世之良醫也嘗與之論脈曰無如華佗之論最切曰性急者脈亦急性緩者脈亦緩長人脈長短人脈短究其說未暇也一日得閩中倉司所刊中藏經讀之其說具在蓋二卿姜公詵為使者時所刊凡三十餘年而余始得之序引之說頗涉神怪難於盡信然其議論卓然精深高遠視脈察色以決死生雖不敢以為真正元化之書若行於世使醫者得以習讀之所濟多矣惜乎差舛難據遂攜至姚江以叩從老從老笑曰此吾家所秘不謂版行已久因出其書見假取而校之乃知閩中之本未善至一版或改定數十百字則目錄後有後序藥方增三之二閩本間亦有佳處可證六本之失其不同而不可輕改者兩存焉始得為善本老不能繕寫俾從子溉手錄之蘄春王使君成父聞之欣然欲於治所大書鋟木以惠後學且以成余之志溉所錄面授而記其始末於下藥方凡六十道亦有今世所用者其間難曉者有之恐非凡識所及佗傳稱處齊不過數種又未知此為是否好事者能以閩本校之始如此本之為可傳也
